name: Build and Deploy to GitHub Pages

on:
  push:
    branches: ["main"]
  schedule:
    - cron: "*/30 * * * *"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MENU_CSV_URL: ${{ secrets.MENU_CSV_URL }}
      ELEVENTY_PATH_PREFIX: /${{ github.event.repository.name }}/
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.19.0
          cache: npm

      - name: Check required secrets
        run: |
          if [ -z "${MENU_CSV_URL}" ]; then
            echo "MENU_CSV_URL is required but missing. Add it in Settings > Secrets and variables > Actions."
            exit 1
          fi

      - name: Install dependencies
        run: npm ci

      - name: Validate malformed CSV behavior
        run: npm run validate:data

      - name: Build site
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

